<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player — Subjects Online</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { blue: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a', 950: '#172554' }, surface: '#ffffff' }, fontFamily: { heading: ['"Playfair Display"', 'Georgia', 'serif'], body: ['Inter', 'system-ui', 'sans-serif'] } } } }</script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/mobile-perf.css">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1b3e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Subjects Online">
    <link rel="apple-touch-icon" href="images/icon-512.png">
</head>

<body class="bg-gray-950 font-body antialiased text-white min-h-screen flex flex-col overflow-x-hidden">

    <!-- Ambient Background Glow -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden flex justify-center items-center">
        <div
            class="w-[80vw] h-[80vw] max-w-[800px] max-h-[800px] bg-blue-500/10 rounded-full blur-[120px] absolute mix-blend-screen animate-pulse duration-1000">
        </div>
        <div
            class="w-[60vw] h-[60vw] max-w-[600px] max-h-[600px] bg-purple-500/10 rounded-full blur-[100px] absolute mix-blend-screen -translate-y-20 translate-x-20">
        </div>
    </div>

    <!-- Top Navigation Bar -->
    <header
        class="relative z-10 w-full h-16 bg-black/20 backdrop-blur-xl border-b border-white/5 flex items-center justify-between px-4 sm:px-8">
        <button onclick="if(history.length > 1) { history.back(); } else { window.location.href = 'chapters.html'; }"
            class="flex items-center gap-2 text-sm font-semibold text-gray-300 hover:text-white transition-colors shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 sm:w-5 sm:h-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            <span class="hidden sm:inline">Back to Course</span>
        </button>

        <h1 class="text-xs sm:text-sm font-bold tracking-wide text-gray-100 flex-1 text-center px-2 sm:px-4 truncate"
            id="player-title">Loading...</h1>

        <div class="flex items-center gap-2 sm:gap-4 shrink-0">
            <!-- Focus Mode Button -->
            <button id="focus-btn"
                class="flex items-center gap-2 text-xs font-semibold text-gray-400 hover:text-white transition-colors bg-white/5 hover:bg-white/10 px-2 sm:px-3 py-1.5 rounded-full border border-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                <span class="hidden sm:inline" id="focus-btn-text">Focus Mode</span>
            </button>
            <!-- PDF Actions (Hidden by default, shown in JS if type=pdf) -->
            <div id="pdf-actions" class="hidden items-center gap-2">
                <button id="download-btn"
                    class="flex items-center gap-1.5 text-xs font-semibold text-gray-300 hover:text-white transition-colors bg-white/5 hover:bg-white/10 px-2 sm:px-3 py-1.5 rounded-full border border-white/10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    <span class="hidden sm:inline">Download</span>
                </button>
                <button id="add-library-btn"
                    class="flex items-center gap-1.5 text-xs font-semibold text-blue-400 hover:text-blue-300 transition-colors bg-blue-500/10 hover:bg-blue-500/20 px-2 sm:px-3 py-1.5 rounded-full border border-blue-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    <span class="hidden sm:inline">Save Offline</span>
                </button>
            </div>
            <div class="w-2 sm:w-12 hidden md:block"></div> <!-- Spacer for centering -->
        </div>
    </header>

    <!-- Main Player Area -->
    <main
        class="relative z-10 flex-1 w-full flex flex-col lg:flex-row items-center lg:items-stretch justify-center p-3 sm:p-6 lg:p-8 gap-4 sm:gap-6">

        <div class="player-container w-full max-w-6xl h-[40vh] min-h-[250px] lg:h-full lg:max-h-[85vh] lg:flex-1 glass-panel rounded-2xl overflow-hidden flex flex-col relative shrink-0 transition-all duration-500 hover:shadow-[0_0_40px_rgba(59,130,246,0.15)]"
            id="player-wrapper">

            <!-- Video Player Element -->
            <video id="video-player" class="hidden w-full h-full" playsinline controls data-poster=""></video>

            <!-- PDF Toolbar -->
            <div id="pdf-toolbar" class="hidden w-full bg-gray-900 border-b border-white/5 px-4 py-2 flex justify-between items-center shrink-0 z-10 relative">
                <span class="text-xs font-semibold text-gray-400" id="pdf-doc-title">PDF Document</span>
                <button id="pdf-fullscreen-btn" class="flex items-center gap-2 text-xs font-semibold text-gray-300 hover:text-white transition-colors bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-lg border border-white/10">
                    <svg id="fs-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                    </svg>
                    <span id="fs-text">Fullscreen</span>
                </button>
            </div>

            <!-- PDF Viewer Element -->
            <iframe id="pdf-player" class="hidden w-full h-full flex-grow border-0 bg-white" src=""></iframe>

            <!-- Loading Indicator -->
            <div id="loading-state" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-20">
                <svg class="animate-spin h-8 w-8 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <p class="text-gray-400 text-sm font-medium animate-pulse">Loading Material...</p>
            </div>

            <!-- Error State -->
            <div id="error-state"
                class="hidden absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-red-500 mb-4" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <p class="text-red-400 text-lg font-bold">Failed to load material.</p>
                <p class="text-gray-500 text-sm mt-2">Please check the URL or try again later.</p>
            </div>

            <!-- Auto Next Overlay -->
            <div id="auto-next-overlay"
                class="hidden absolute inset-0 bg-black/70 backdrop-blur-md z-40 flex flex-col items-center justify-center p-4">

                <div
                    class="glass-card rounded-[2rem] p-8 sm:p-12 w-full max-w-lg flex flex-col items-center animate-[slideUpFade_0.4s_ease-out]">
                    <h3 class="text-blue-400 font-bold mb-3 text-xs uppercase tracking-[0.2em]">Up Next</h3>
                    <h2 id="next-lec-title"
                        class="text-white text-xl sm:text-3xl font-bold mb-8 text-center leading-tight">Next Lecture
                        Title</h2>

                    <div class="relative w-28 h-28 mb-10 flex items-center justify-center">
                        <svg class="transform -rotate-90 w-28 h-28 drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]">
                            <circle cx="56" cy="56" r="52" stroke="rgba(255,255,255,0.05)" stroke-width="6"
                                fill="transparent" />
                            <circle id="next-timer-circle" cx="56" cy="56" r="52"
                                stroke="var(--subject-accent, #3b82f6)" stroke-width="6" fill="transparent"
                                stroke-dasharray="326" stroke-dashoffset="0"
                                class="transition-all duration-1000 ease-linear" />
                        </svg>
                        <span id="next-timer-text" class="absolute text-4xl font-black text-white">5</span>
                    </div>

                    <div class="flex gap-4 w-full">
                        <button id="cancel-next-btn"
                            class="flex-1 py-3 rounded-xl border border-white/10 text-gray-300 hover:text-white hover:bg-white/5 font-semibold transition-all">Cancel</button>
                        <button id="play-next-btn"
                            class="flex-1 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold transition-all shadow-[0_0_20px_rgba(37,99,235,0.4)] hover:shadow-[0_0_30px_rgba(37,99,235,0.6)]">Play
                            Now</button>
                    </div>
                </div>

            </div>

        </div>

        <!-- Notes Section (Side Panel / Bottom Panel on Mobile) -->
        <aside id="notes-sidebar"
            class="hidden flex-col w-full lg:w-80 min-h-[300px] h-[45vh] lg:h-full lg:max-h-[85vh] glass-panel rounded-2xl overflow-hidden shrink-0 transition-all duration-500 hover:shadow-[0_0_30px_rgba(255,255,255,0.03)]">
            <div class="p-4 border-b border-white/5 bg-gradient-to-r from-white/5 to-transparent shrink-0">
                <h3 class="text-white font-bold flex items-center gap-2 text-sm sm:text-base">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-400" viewBox="0 0 20 20"
                        fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
                            clip-rule="evenodd" />
                    </svg>
                    My Notes
                </h3>
            </div>

            <div class="flex-1 overflow-y-auto p-3 sm:p-4 flex flex-col gap-3" id="notes-list">
                <!-- Notes will be injected here -->
                <p class="text-gray-500 text-xs sm:text-sm text-center mt-6 sm:mt-10 italic" id="empty-notes-msg">No
                    notes yet. Add one below!</p>
            </div>

            <div class="p-3 sm:p-4 border-t border-white/5 bg-gray-900/80 shrink-0">
                <textarea id="note-input" rows="2"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none mb-2 sm:mb-3"
                    placeholder="Add a note at current time..."></textarea>
                <button id="add-note-btn"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 rounded-lg transition-colors flex items-center justify-center gap-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
                            clip-rule="evenodd" />
                    </svg>
                    Save Note
                </button>
            </div>
        </aside>

    </main>

    <!-- Plyr JS -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <!-- Custom JS -->
    <script src="js/player.js"></script>
    <!-- Firebase SDK & Sync -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/pwa.js"></script>
</body>

</html>
