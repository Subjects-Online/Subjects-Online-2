<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - Subjects Online</title>
    
    <!-- Page Transition Script -->
    <script src="js/page-transition.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="bg-blue-50/30 text-slate-800 min-h-screen relative overflow-x-hidden antialiased">

    <!-- Ambient Background Glows -->
    <div class="glow-orb orb-1 fixed top-0 left-[-10%] w-[500px] h-[500px] bg-[radial-gradient(circle,rgba(56,189,248,0.15),transparent_70%)] rounded-full blur-3xl pointer-events-none -z-10"></div>
    <div class="glow-orb orb-2 fixed bottom-0 right-[-10%] w-[600px] h-[600px] bg-[radial-gradient(circle,rgba(59,130,246,0.1),transparent_70%)] rounded-full blur-3xl pointer-events-none -z-10"></div>

    <main class="page-content max-w-2xl mx-auto px-6 py-12">
        <a href="dashboard.html" class="back-btn mb-8">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to Dashboard
        </a>

        <!-- Header & Avatar Upload -->
        <div class="mb-10 text-center relative">
            <div id="profile-avatar-display" class="w-24 h-24 rounded-full mx-auto mb-4 bg-gradient-to-br flex items-center justify-center text-4xl text-white font-bold shadow-[0_10px_30px_rgba(37,99,235,0.3)] border-4 border-white/50 overflow-hidden bg-cover bg-center">
                S
            </div>
            
            <div class="flex justify-center gap-3 mt-4">
                <label class="cursor-pointer bg-white border border-blue-200 text-blue-600 hover:bg-blue-50 hover:border-blue-300 font-semibold py-1.5 px-4 rounded-full text-xs shadow-sm transition-all">
                    Upload Picture
                    <input type="file" id="avatar-upload" accept="image/*" class="hidden">
                </label>
                <button id="avatar-remove" type="button" class="hidden bg-white border border-red-200 text-red-500 hover:bg-red-50 hover:border-red-300 font-semibold py-1.5 px-4 rounded-full text-xs shadow-sm transition-all">
                    Remove
                </button>
            </div>

            <h1 class="font-heading text-3xl font-bold text-blue-950 mt-6">Profile Settings</h1>
            <p class="text-blue-500 mt-2 text-sm">Update your personal details and preferences</p>
        </div>

        <!-- Form Card -->
        <div class="stat-card p-8 rounded-[2rem] relative overflow-hidden">
            <form id="profile-form" class="flex flex-col gap-6 relative z-10">
                
                <!-- Full Name -->
                <div>
                    <label class="block text-xs font-bold text-blue-900 uppercase tracking-wider mb-2">Full Name</label>
                    <input type="text" id="profile-name" required
                           class="w-full bg-white/70 border border-blue-200 text-blue-900 text-sm rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>

                <!-- Department -->
                <div>
                    <label class="block text-xs font-bold text-blue-900 uppercase tracking-wider mb-2">Department</label>
                    <div class="relative">
                        <select id="profile-dept" required
                                class="w-full bg-white/70 border border-blue-200 text-blue-900 text-sm rounded-xl px-4 py-3 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                            <option value="Accounting">Accounting</option>
                            <option value="Business Administration">Business Administration</option>
                            <option value="Economics">Economics</option>
                            <option value="Statistics">Statistics</option>
                            <option value="Information Systems">Information Systems</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-blue-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>

                <!-- Avatar Color Theme -->
                <div>
                    <label class="block text-xs font-bold text-blue-900 uppercase tracking-wider mb-3">Avatar Theme</label>
                    <div class="flex gap-4" id="avatar-theme-selector">
                        <button type="button" data-theme="blue" class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-600 to-blue-400 ring-2 ring-offset-2 ring-blue-500 transition-all"></button>
                        <button type="button" data-theme="emerald" class="w-10 h-10 rounded-full bg-gradient-to-br from-emerald-500 to-teal-400 opacity-60 hover:opacity-100 transition-all"></button>
                        <button type="button" data-theme="rose" class="w-10 h-10 rounded-full bg-gradient-to-br from-rose-500 to-pink-500 opacity-60 hover:opacity-100 transition-all"></button>
                        <button type="button" data-theme="violet" class="w-10 h-10 rounded-full bg-gradient-to-br from-violet-600 to-purple-500 opacity-60 hover:opacity-100 transition-all"></button>
                    </div>
                </div>

                <div class="mt-4 flex gap-4">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-700 hover:to-blue-600 text-white font-bold py-3.5 px-6 rounded-xl transition-all shadow-[0_4px_15px_rgba(37,99,235,0.3)] hover:shadow-[0_6px_25px_rgba(37,99,235,0.4)]">
                        Save Changes
                    </button>
                    <button type="button" id="logout-btn" class="bg-red-50 text-red-600 hover:bg-red-100 hover:text-red-700 border border-red-200 font-bold py-3.5 px-6 rounded-xl transition-all flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Logout
                    </button>
                </div>
                
                <div id="success-msg" class="hidden text-center text-emerald-600 font-medium text-sm mt-2">
                    Profile updated successfully! Redirecting...
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="js/shared-nav.js"></script>
    <script src="js/premium-effects.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
