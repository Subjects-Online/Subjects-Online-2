<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects Online — Your Gateway to Knowledge</title>
    <meta name="description" content="Subjects Online">

    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            300: '#7dd3fc',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        accent: {
                            purple: '#a855f7',
                            indigo: '#6366f1',
                            cyan: '#06b6d4',
                        }
                    },
                    fontFamily: {
                        heading: ['"Playfair Display"', 'Georgia', 'serif'],
                        body: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/splash.css">
    <link rel="stylesheet" href="css/mobile-perf.css">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d1b3e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Subjects Online">
    <link rel="apple-touch-icon" href="/images/icon-512.png"></head>

<body class="bg-slate-50 font-body antialiased text-slate-900 overflow-hidden">

    <!-- ===== SPLASH SCREEN ===== -->
    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center overflow-hidden select-none bg-slate-50">
        
        <!-- Animated Background Gradient Blobs -->
        <!-- Use mix-blend-multiply for white background -->
        <div class="absolute top-0 -left-10 w-80 h-80 bg-accent-cyan rounded-full mix-blend-multiply filter blur-[80px] opacity-30 animate-blob"></div>
        <div class="absolute top-0 -right-10 w-80 h-80 bg-accent-indigo rounded-full mix-blend-multiply filter blur-[80px] opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-20 left-20 w-80 h-80 bg-accent-purple rounded-full mix-blend-multiply filter blur-[80px] opacity-20 animate-blob animation-delay-4000"></div>

        <!-- Subtle Grid Pattern -->
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMCwwLDAsMC4wNCkiLz48L3N2Zz4=')]"></div>

        <!-- Floating particles -->
        <div class="particles-container z-0" id="particles"></div>

        <!-- Glassmorphism Container -->
        <div class="relative z-10 flex flex-col items-center p-10 md:p-14 rounded-[2.5rem] backdrop-blur-xl border border-white/60 shadow-[0_8px_32px_0_rgba(31,38,135,0.07)] bg-white/40">
            
            <!-- Logo Mark -->
            <div class="logo-mark-wrapper mb-10" id="logo-mark">
                <!-- Glowing Backdrop -->
                <div class="absolute inset-0 rounded-full bg-brand-300/40 blur-2xl scale-[1.3] animate-pulse"></div>

                <!-- 3D Orbital Rings -->
                <div class="orbital orbital-1">
                    <svg viewBox="0 0 200 200" class="w-full h-full">
                        <circle cx="100" cy="100" r="90" fill="none" stroke="url(#grad1)" stroke-width="1.5" stroke-dasharray="100 150" opacity="0.8" />
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#0ea5e9" />
                                <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="orbital orbital-2">
                    <svg viewBox="0 0 200 200" class="w-full h-full">
                        <circle cx="100" cy="100" r="80" fill="none" stroke="url(#grad2)" stroke-width="2" stroke-dasharray="80 200" opacity="0.7" />
                        <defs>
                            <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#6366f1" />
                                <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="orbital orbital-3">
                    <svg viewBox="0 0 200 200" class="w-full h-full">
                        <circle cx="100" cy="100" r="70" fill="none" stroke="url(#grad3)" stroke-width="2.5" stroke-dasharray="40 200" opacity="0.9" />
                        <defs>
                            <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#a855f7" />
                                <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>

                <!-- Glowing Orbital Dots -->
                <div class="orbital-dot dot-1"></div>
                <div class="orbital-dot dot-2"></div>
                <div class="orbital-dot dot-3"></div>

                <!-- Inner S Circle -->
                <div class="s-circle">
                    <div class="s-circle-border"></div>
                    <span class="s-letter">S</span>
                </div>
            </div>

            <!-- Brand Text -->
            <div class="text-center brand-text" id="brand-text">
                <h1 class="flex items-baseline justify-center gap-2 md:gap-3">
                    <span class="font-heading text-4xl md:text-6xl font-bold text-brand-900 tracking-tight drop-shadow-sm">Subjects</span>
                    <span class="font-heading text-4xl md:text-6xl font-light text-transparent bg-clip-text bg-gradient-to-r from-brand-500 to-accent-indigo">Online</span>
                </h1>
                <p class="mt-4 text-[10px] md:text-xs font-semibold tracking-[0.4em] uppercase text-brand-600/70 font-body">
                    Your Gateway to Knowledge
                </p>
            </div>


        </div>

        <!-- Bottom branding -->
        <div class="absolute bottom-6 text-center z-10">
            <p class="text-[9px] tracking-[0.25em] uppercase text-slate-500/50 font-body font-medium">
                © 2026 Subjects Online — Premium Educational Platform
            </p>
        </div>
    </div>

    <script src="js/splash.js"></script>
<!-- Firebase SDK & Sync -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>
    <script src="/js/pwa.js"></script>
</body>
</html>
