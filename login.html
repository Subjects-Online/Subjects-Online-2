<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Subjects Online</title>
    
    <!-- Page Transition Script -->
    <script src="js/page-transition.js"></script>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blue: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                            950: '#172554',
                        },
                        surface: '#ffffff',
                    },
                    fontFamily: {
                        heading: ['"Playfair Display"', 'Georgia', 'serif'],
                        body: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Shared & Login Styles -->
    <link rel="stylesheet" href="css/welcome.css"> <!-- For the glowing mesh background -->
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/mobile-perf.css">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1b3e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Subjects Online">
    <link rel="apple-touch-icon" href="images/icon-512.png"></head>
<body class="bg-surface font-body antialiased text-blue-900 min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Glowing Background Mesh -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
        <div class="absolute inset-0 opacity-[0.03]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 w-full max-w-md px-6 mx-auto my-auto py-12 flex flex-col items-center">
        
        <!-- Glowing Site Name -->
        <div class="login-header mb-10 text-center flex flex-col items-center">
            <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-blue-600 to-blue-400 flex items-center justify-center text-white font-heading font-bold text-2xl mb-4 shadow-[0_0_25px_rgba(37,99,235,0.6)]">S</div>
            <h1 class="font-heading text-4xl md:text-5xl font-extrabold text-blue-950 tracking-tight drop-shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                Subjects <span class="text-blue-500 font-light">Online</span>
            </h1>
            <p class="mt-3 text-sm font-medium tracking-[0.2em] uppercase text-blue-400">Join the Community</p>
        </div>

        <!-- Login Card -->
        <div class="login-card w-full bg-white/70 backdrop-blur-2xl border border-blue-100 p-8 sm:p-10 rounded-[2rem] shadow-[0_30px_60px_rgba(37,99,235,0.08)] relative">
            
            <!-- Card inner glow -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-48 bg-blue-400/20 rounded-full blur-[40px] pointer-events-none"></div>

            <form id="login-form" class="relative z-10 flex flex-col items-center w-full">

                <!-- Department Selection Section -->
                <div class="w-full mb-8">
                    <label for="user-department" class="block text-sm font-semibold text-blue-900 mb-2 ml-1">Your Department <span class="text-blue-500">*</span></label>
                    <div class="relative">
                        <select id="user-department" required
                            class="w-full bg-white/80 border border-blue-200 text-blue-900 text-lg rounded-xl px-5 py-3.5 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all shadow-inner cursor-pointer invalid:text-blue-300">
                            <option value="" disabled selected>Select your department...</option>
                            <option value="accounting">Accounting</option>
                            <option value="business">Business Administration</option>
                            <option value="economics">Economics</option>
                            <option value="statistics">Statistics</option>
                            <option value="is">Information Systems</option>
                        </select>
                        <!-- Custom Select Arrow -->
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>
                    <p class="text-xs text-red-500 mt-2 ml-1 hidden" id="dept-error">Please select your department first.</p>
                </div>
                
                <!-- Google Sign In Button -->
                <button type="button" id="google-btn" class="w-full flex items-center justify-center gap-3 bg-white border border-blue-200 text-blue-900 font-semibold text-base md:text-lg rounded-xl px-5 py-3.5 mb-6 shadow-sm hover:bg-blue-50 transition-all hover:shadow-md hover:-translate-y-0.5">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="w-6 h-6">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    Sign in with Google
                </button>

                <!-- Divider -->
                <div class="w-full flex items-center gap-4 mb-8">
                    <div class="flex-1 h-px bg-blue-100"></div>
                    <span class="text-xs font-semibold text-blue-400 uppercase tracking-widest">Or continue with</span>
                    <div class="flex-1 h-px bg-blue-100"></div>
                </div>


                <!-- Name Input Section -->
                <div class="w-full mb-8">
                    <label for="user-name" class="block text-sm font-semibold text-blue-900 mb-2 ml-1">Your Name <span class="text-blue-500">*</span></label>
                    <div class="relative">
                        <input type="text" id="user-name" required placeholder="e.g. Ahmed Tamer" autocomplete="off"
                            class="w-full bg-white/80 border border-blue-200 text-blue-900 text-lg rounded-xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder:text-blue-300 shadow-inner">
                        <!-- Validation indicator -->
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-0 transition-opacity" id="name-valid-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                    </div>
                    <p class="text-xs text-red-500 mt-2 ml-1 hidden" id="name-error">Please enter your name to continue.</p>
                </div>

                <!-- Password Input Section -->
                <div class="w-full mb-8">
                    <label for="user-password" class="block text-sm font-semibold text-blue-900 mb-2 ml-1">Password <span class="text-blue-500">*</span></label>
                    <div class="relative">
                        <input type="password" id="user-password" required placeholder="••••••••"
                            class="w-full bg-white/80 border border-blue-200 text-blue-900 text-lg rounded-xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder:text-blue-300 shadow-inner">
                        <!-- Validation indicator -->
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-0 transition-opacity" id="password-valid-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                    </div>
                    <p class="text-xs text-red-500 mt-2 ml-1 hidden" id="password-error">Please enter your password.</p>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="w-full relative group overflow-hidden rounded-xl bg-blue-600 px-8 py-4 text-white font-semibold text-lg tracking-wide shadow-[0_10px_20px_rgba(37,99,235,0.3)] transition-all hover:shadow-[0_15px_30px_rgba(37,99,235,0.4)] hover:-translate-y-0.5">
                    <span class="relative z-10 flex items-center justify-center gap-2">
                        Enter Platform
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transition-transform group-hover:translate-x-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </span>
                    <div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-blue-400 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </button>

            </form>
        </div>
    </div>

    <!-- GSAP Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

            
                <!-- Firebase SDK & Sync -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/login.js"></script>

    <!-- Creative Fullscreen Loader Overlay -->
    <div id="creative-loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none backdrop-blur-xl bg-surface/80 transition-all">
        <!-- Orbital rings container -->
        <div class="relative w-40 h-40 flex items-center justify-center mb-8">
            <!-- Outer spinning ring -->
            <div class="absolute inset-0 border-t-2 border-r-2 border-blue-500 rounded-full animate-spin-slow shadow-[0_0_15px_rgba(59,130,246,0.4)]"></div>
            <!-- Inner reverse spinning ring -->
            <div class="absolute inset-4 border-b-2 border-l-2 border-blue-300 rounded-full animate-spin-reverse shadow-[0_0_10px_rgba(96,165,250,0.4)]"></div>
            <!-- Center Glowing Logo -->
            <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-blue-700 to-blue-400 flex items-center justify-center text-white font-heading font-bold text-3xl shadow-[0_0_30px_rgba(37,99,235,0.8)] pulse-glow">S</div>
        </div>
        
        <!-- Text with changing status -->
        <h2 class="font-heading text-3xl font-bold text-blue-950 tracking-tight mb-3 drop-shadow-sm">Creating your dashboard</h2>
        <div class="h-6 overflow-hidden flex items-center justify-center">
            <p id="loader-status-text" class="text-sm font-semibold text-blue-500 tracking-[0.2em] uppercase">Initializing...</p>
        </div>
        
        <!-- Progress Bar -->
        <div class="w-64 h-1.5 bg-blue-100 rounded-full mt-8 overflow-hidden relative shadow-inner">
            <div id="loader-progress" class="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-600 to-blue-400 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.8)] w-0"></div>
        </div>
    </div>
    <script src="js/pwa.js"></script>
</body>
</html>
