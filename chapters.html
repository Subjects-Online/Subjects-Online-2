<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/welcome.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/chapters.css">
    <link rel="stylesheet" href="css/mobile-perf.css">

    <meta name="theme-color" content="#0d1b3e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="/images/icon-512.png"></head>
<body class="bg-surface font-body antialiased text-blue-900 min-h-screen relative overflow-x-hidden">

    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="glow-orb orb-1" style="opacity:0.10;"></div>
        <div class="glow-orb orb-2" style="opacity:0.10;"></div>
    </div>

    <!-- Navbar injected by JS -->

    <!-- ════════════════════════════════════════════════
         HERO SECTION
    ════════════════════════════════════════════════ -->
    <div class="chap-hero" id="chap-hero">
        <div class="chap-hero-bg" id="chap-hero-bg"></div>
        <div class="chap-hero-grid"></div>

        <a href="javascript:history.back()" class="chap-back-btn" id="chap-back">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to Subject
        </a>

        <div class="chap-hero-content">
            <div class="chap-tag">Course Content</div>
            <h1 class="chap-title" id="chap-subj-title">Loading...</h1>
            <p class="chap-subtitle">Master the material chapter by chapter with full detailed explanations.</p>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════
         TIMELINE CONTENT
    ════════════════════════════════════════════════ -->
    <main class="relative z-10 w-full max-w-4xl mx-auto px-6 pb-32 -mt-10">
        
        <div class="timeline-container" id="timeline-container">
            <!-- Injected by JS -->
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <!-- Firebase SDK & Sync -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/shared-nav.js"></script>
    <script src="js/premium-effects.js"></script>
    <script src="js/data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="js/chapters.js?v=2"></script>
    <script src="/js/pwa.js"></script>
